[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"

# WordPress legacy redirects
[[redirects]]
  from = "/feed/"
  to = "/"
  status = 301

[[redirects]]
  from = "/feed"
  to = "/"
  status = 301

[[redirects]]
  from = "/comments/feed/"
  to = "/"
  status = 301

[[redirects]]
  from = "/author/rach/"
  to = "/"
  status = 301

[[redirects]]
  from = "/author/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/category/doubleyummy/"
  to = "/"
  status = 301

[[redirects]]
  from = "/category/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-admin/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-login.php"
  to = "/"
  status = 301

[[redirects]]
  from = "/wp-content/*"
  to = "/"
  status = 301

# Start Here redirect (old post URL → homepage)
[[redirects]]
  from = "/where-to-start/"
  to = "/"
  status = 301

[[redirects]]
  from = "/where-to-start"
  to = "/"
  status = 301

# Custom 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
